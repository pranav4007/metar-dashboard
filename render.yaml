services:
  - type: web
    name: metar-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: POLL_INTERVAL
        value: 300
      - key: DB_PATH
        value: /tmp/metar_history.db
